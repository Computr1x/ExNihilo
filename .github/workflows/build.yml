name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_CONFIG: Release
      PROJECT: ./ExNihilo/ExNihilo.csproj
      TESTS: ./Tests/Tests.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore project
        run: dotnet restore $PROJECT

      - name: Restore tests
        run: dotnet restore $TESTS

      - name: Build project
        run: dotnet build $PROJECT --configuration $BUILD_CONFIG --no-restore

      - name: Build tests
        run: dotnet build $TESTS --configuration $BUILD_CONFIG --no-restore

      - name: Run tests
        run: dotnet test $TESTS --configuration $BUILD_CONFIG --no-restore --no-build --verbosity normal